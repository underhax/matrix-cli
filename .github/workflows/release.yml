name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"


      - name: Build and Archive
        run: |
          mkdir -p release_assets

          # List of OS/ARCH targets
          TARGETS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64"

          for target in $TARGETS; do
            GOOS=${target%/*}
            GOARCH=${target#*/}
            echo "Building for $GOOS/$GOARCH..."

            mkdir -p "build_${GOOS}_${GOARCH}"
            cp LICENSE "build_${GOOS}_${GOARCH}/"
            cp README.md "build_${GOOS}_${GOARCH}/"

            FRIENDLY_OS=$GOOS
            FRIENDLY_ARCH=$GOARCH

            if [ "$GOOS" = "darwin" ]; then
              FRIENDLY_OS="macos"
              if [ "$GOARCH" = "amd64" ]; then
                FRIENDLY_ARCH="intel"
              elif [ "$GOARCH" = "arm64" ]; then
                FRIENDLY_ARCH="apple-silicon"
              fi
            elif [ "$GOOS" = "windows" ]; then
              if [ "$GOARCH" = "amd64" ]; then
                FRIENDLY_ARCH="x64"
              fi
            fi

            if [ "$GOOS" = "windows" ]; then
              GOOS=$GOOS GOARCH=$GOARCH go build -tags goolm -ldflags "-X 'main.AppVersion=${{ github.ref_name }}'" -o "build_${GOOS}_${GOARCH}/matrix-cli.exe" ./cmd/matrix-cli
              cd "build_${GOOS}_${GOARCH}"
              zip -r "../release_assets/matrix-cli-${FRIENDLY_OS}-${FRIENDLY_ARCH}.zip" ./*
              cd ..
            else
              GOOS=$GOOS GOARCH=$GOARCH go build -tags goolm -ldflags "-X 'main.AppVersion=${{ github.ref_name }}'" -o "build_${GOOS}_${GOARCH}/matrix-cli" ./cmd/matrix-cli
              cd "build_${GOOS}_${GOARCH}"
              tar -czvf "../release_assets/matrix-cli-${FRIENDLY_OS}-${FRIENDLY_ARCH}.tar.gz" ./*
              cd ..
            fi
          done

      - name: Publish Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
